spring.application.name=parkease

server.port=${PORT:8080}
 
# Timeout (minutes) for pending bookings before they are considered expired and the slot released
# Reduced to 2 minutes to minimize slot blocking while allowing reasonable payment time
parkease.booking.pending-payment-timeout-minutes=1

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}